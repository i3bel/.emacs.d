name: Build and Deploy .emacs.d site

on:
  push:
    branches: [ master ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Emacs
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox
          sudo apt-get install -y elpa-htmlize || true

      - name: Build site with org-publish
        run: |
          emacs -Q --batch -l ./.github/scripts/publish-site.el

      - name: Add README.html redirect
        run: |
          cat > ./public/README.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=./init.html" />
              <link rel="canonical" href="./init.html" />
              <title>Redirecting...</title>
            </head>
            <body>
              <a href="./init.html">Go to init.html</a>
            </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
